<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="glow-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.35"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background: dark navy rounded square -->
  <rect width="32" height="32" rx="7" fill="#0a0f1e"/>

  <!-- Subtle inner glow border -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="6.5" stroke="url(#glow-grad)" stroke-width="1"/>

  <!-- < bracket -->
  <path d="M6 16 L11 11 L12.4 12.6 L8.8 16 L12.4 19.4 L11 21 Z" fill="url(#grad)" filter="url(#glow)"/>

  <!-- / slash -->
  <path d="M13.5 21 L18.5 11 L20.2 11 L15.2 21 Z" fill="url(#grad)" filter="url(#glow)"/>

  <!-- > bracket -->
  <path d="M26 16 L21 21 L19.6 19.4 L23.2 16 L19.6 12.6 L21 11 Z" fill="url(#grad)" filter="url(#glow)"/>

  <style>
    rect:first-of-type { animation: pulse 3s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
    }
  </style>
</svg>
